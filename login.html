<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول — لوحة تحكم رحلاتي</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0d2137 0%, #050d18 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            margin: 0;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 480px;
            transition: all 0.3s ease;
        }

        .login-card:hover {
            border-color: rgba(197, 160, 40, 0.3);
            box-shadow: 0 20px 40px rgba(197, 160, 40, 0.08);
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo img {
            width: 70px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(197, 160, 40, 0.3));
        }

        .brand-title {
            color: #c5a028;
            font-weight: 800;
            font-size: 1.75rem;
            margin: 0;
        }

        .brand-subtitle {
            color: #a0aec0;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
            display: block;
            text-align: right;
        }

        /* Custom RTL-friendly input wrapper */
        .field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .field-wrapper:focus-within {
            border-color: #c5a028;
            box-shadow: 0 0 0 3px rgba(197, 160, 40, 0.2);
            background: rgba(255, 255, 255, 0.07);
        }

        .field-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            min-width: 48px;
            height: 52px;
            color: #718096;
            font-size: 1rem;
            transition: color 0.2s ease;
            /* Left side in RTL = visual right */
            order: 2;
        }

        .field-wrapper:focus-within .field-icon {
            color: #c5a028;
        }

        .field-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            padding: 0.85rem 1rem;
            height: 52px;
            order: 1;
            direction: ltr; /* keep email/password LTR inside */
            text-align: right;
        }

        .field-input[type="email"],
        .field-input[type="password"] {
            text-align: left;
        }

        .field-input::placeholder {
            color: #4a5568;
            direction: ltr;
            text-align: left;
        }

        .field-input:autofill,
        .field-input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 50px rgba(13, 33, 55, 0.9) inset;
            -webkit-text-fill-color: #ffffff;
            caret-color: #ffffff;
        }

        /* Password toggle eye button */
        .field-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            min-width: 40px;
            height: 52px;
            background: transparent;
            border: none;
            color: #4a5568;
            cursor: pointer;
            transition: color 0.2s ease;
            order: 0;
            padding: 0;
        }

        .field-toggle:hover {
            color: #c5a028;
        }

        .btn-login {
            background: linear-gradient(135deg, #c5a028 0%, #b38f1e 100%);
            border: none;
            color: #0d2137;
            font-weight: 700;
            font-size: 1.05rem;
            font-family: 'Cairo', sans-serif;
            padding: 0.9rem;
            border-radius: 12px !important;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(197, 160, 40, 0.3);
            cursor: pointer;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #d4af37 0%, #c5a028 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(197, 160, 40, 0.45);
            color: #0d2137;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }

        .alert-custom {
            border-radius: 12px;
            font-size: 0.85rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-error {
            background: rgba(229, 62, 62, 0.15);
            border: 1px solid rgba(229, 62, 62, 0.3);
            color: #fc8181;
        }

        .alert-success {
            background: rgba(72, 187, 120, 0.15);
            border: 1px solid rgba(72, 187, 120, 0.3);
            color: #68d391;
        }

        .back-to-site {
            text-align: center;
            margin-top: 2rem;
        }

        .back-to-site a {
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s ease;
        }

        .back-to-site a:hover {
            color: #c5a028;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Coat_of_arms_of_Egypt.svg" alt="Eagle">
            <h1 class="brand-title">رحلاتي</h1>
            <p class="brand-subtitle">لوحة التحكم السحابية المباشرة</p>
        </div>

        <div id="loginAlert" class="alert-custom">
            <i class="fa-solid fa-circle-info"></i>
            <span id="alertMessage"></span>
        </div>

        <form id="loginForm">
            <!-- Email Field -->
            <div class="mb-4">
                <label for="email" class="form-label">البريد الإلكتروني</label>
                <div class="field-wrapper">
                    <span class="field-icon">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input
                        type="email"
                        id="email"
                        class="field-input"
                        placeholder="admin@rahalaty.com"
                        required
                        autocomplete="email"
                    >
                </div>
            </div>

            <!-- Password Field -->
            <div class="mb-4">
                <label for="password" class="form-label">كلمة المرور</label>
                <div class="field-wrapper">
                    <span class="field-icon">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input
                        type="password"
                        id="password"
                        class="field-input"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="field-toggle" id="togglePassword" title="إظهار/إخفاء كلمة المرور">
                        <i class="fa-solid fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-login">
                <span id="btnText">تسجيل الدخول</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
            </button>
        </form>

        <div class="back-to-site">
            <a href="./"><i class="fa-solid fa-arrow-left me-1"></i>العودة للموقع الرئيسي</a>
        </div>
    </div>

    <!-- Appwrite Web SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <script src="js/config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if already logged in, redirect immediately
            if (sessionStorage.getItem('rahalaty_admin_logged_in') === 'true') {
                window.location.href = 'admin.html';
                return;
            }

            const loginForm = document.getElementById('loginForm');
            const alertBox = document.getElementById('loginAlert');
            const alertMessage = document.getElementById('alertMessage');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // Password visibility toggle
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            togglePassword.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                toggleIcon.className = isPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
            });

            function showAlert(message, type = 'error') {
                alertBox.className = `alert-custom alert-${type}`;
                alertBox.querySelector('i').className = type === 'error' ? 'fa-solid fa-circle-xmark' : 'fa-solid fa-circle-check';
                alertMessage.textContent = message;
                alertBox.style.display = 'flex';
            }

            function hideAlert() {
                alertBox.style.display = 'none';
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideAlert();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                // Set loading state
                submitBtn.disabled = true;
                btnText.textContent = 'جاري التحقق...';
                btnSpinner.classList.remove('d-none');

                try {
                    // Verify Appwrite SDK is loaded
                    if (typeof Appwrite === 'undefined') {
                        throw new Error('SDK_NOT_LOADED');
                    }

                    const { Client, Databases, Query } = Appwrite;
                    const conf = window.CONFIG.appwrite;

                    // --- Step 1: Ping Appwrite health to detect CORS vs real network error ---
                    let healthOk = false;
                    try {
                        const ping = await fetch(`${conf.endpoint}/health`, {
                            method: 'GET',
                            headers: { 'X-Appwrite-Project': conf.projectId }
                        });
                        healthOk = true; // got a response (even 4xx = server reachable)
                    } catch (pingErr) {
                        // fetch threw = CORS blocked or server unreachable
                        const origin = window.location.origin;
                        throw new Error(`CORS_OR_NETWORK:${origin}`);
                    }

                    // --- Step 2: Create Appwrite client and query admins ---
                    const client = new Client()
                        .setEndpoint(conf.endpoint)
                        .setProject(conf.projectId);

                    const databases = new Databases(client);

                    const response = await databases.listDocuments(
                        conf.databaseId,
                        'admins',
                        [
                            Query.equal('email', [email]),
                            Query.equal('password', [password])
                        ]
                    );

                    if (response.documents.length > 0) {
                        const adminUser = response.documents[0];

                        // Save session
                        sessionStorage.setItem('rahalaty_admin_logged_in', 'true');
                        sessionStorage.setItem('rahalaty_admin_name', adminUser.name || 'Admin');
                        sessionStorage.setItem('rahalaty_admin_email', adminUser.email || email);
                        sessionStorage.setItem('rahalaty_admin_role', adminUser.role || 'admin');

                        showAlert('تم تسجيل الدخول بنجاح! جاري التحويل للوحة التحكم...', 'success');

                        setTimeout(() => {
                            window.location.href = 'admin.html';
                        }, 1200);
                    } else {
                        showAlert('عذراً، البريد الإلكتروني أو كلمة المرور غير صحيحة.');
                        submitBtn.disabled = false;
                        btnText.textContent = 'تسجيل الدخول';
                        btnSpinner.classList.add('d-none');
                    }

                } catch (err) {
                    console.error('Login Error:', err.message, err.code, err);

                    let msg;

                    if (err.message === 'SDK_NOT_LOADED') {
                        msg = 'خطأ: لم يتم تحميل Appwrite SDK. تحقق من اتصالك بالإنترنت.';

                    } else if (err.message?.startsWith('CORS_OR_NETWORK:')) {
                        const origin = err.message.split(':').slice(1).join(':');
                        msg = `خطأ CORS: الموقع الحالي (${origin}) غير مضاف في Appwrite Platforms.
الحل: افتح Appwrite Console → Settings → Integrations → Platforms → اضغط Add Platform → Web واكتب (${window.location.hostname})`;

                    } else if (err.code === 404) {
                        msg = 'خطأ 404: جدول admins غير موجود. تأكد أن Collection ID = admins في Appwrite.';

                    } else if (err.code === 401) {
                        msg = 'خطأ 401: لا توجد صلاحية وصول لجدول admins. تأكد من تفعيل Read permissions للـ Any.';

                    } else if (err.code === 400) {
                        msg = 'خطأ 400: البريد الإلكتروني أو كلمة المرور غير صحيح. تحقق من البيانات.';

                    } else {
                        msg = `خطأ [${err.code || '?'}]: ${err.message || 'غير معروف'}`;
                    }

                    showAlert(msg);
                    submitBtn.disabled = false;
                    btnText.textContent = 'تسجيل الدخول';
                    btnSpinner.classList.add('d-none');
                }
            });
        });
    </script>
</body>
</html>
