<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول — لوحة تحكم رحلاتي</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0d2137 0%, #050d18 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            margin: 0;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 480px;
            transition: all 0.3s ease;
        }

        .login-card:hover {
            border-color: rgba(197, 160, 40, 0.3);
            box-shadow: 0 20px 40px rgba(197, 160, 40, 0.08);
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo img {
            width: 70px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(197, 160, 40, 0.3));
        }

        .brand-title {
            color: #c5a028;
            font-weight: 800;
            font-size: 1.75rem;
            margin: 0;
        }

        .brand-subtitle {
            color: #a0aec0;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: #c5a028;
            box-shadow: 0 0 0 3px rgba(197, 160, 40, 0.25);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: #a0aec0;
            padding-left: 0.5rem;
            padding-right: 1rem;
        }

        .form-control {
            background: transparent;
            border: none;
            color: #ffffff;
            padding: 0.8rem 0.5rem;
            font-size: 0.95rem;
        }

        .form-control:focus {
            background: transparent;
            box-shadow: none;
            color: #ffffff;
        }

        .form-control::placeholder {
            color: #718096;
        }

        .btn-login {
            background: linear-gradient(135deg, #c5a028 0%, #b38f1e 100%);
            border: none;
            color: #0d2137;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 0.9rem;
            border-radius: 12px !important;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(197, 160, 40, 0.3);
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #d4af37 0%, #c5a028 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(197, 160, 40, 0.45);
            color: #0d2137;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert-custom {
            border-radius: 12px;
            font-size: 0.85rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-error {
            background: rgba(229, 62, 62, 0.15);
            border: 1px solid rgba(229, 62, 62, 0.3);
            color: #fc8181;
        }

        .alert-success {
            background: rgba(72, 187, 120, 0.15);
            border: 1px solid rgba(72, 187, 120, 0.3);
            color: #68d391;
        }

        .back-to-site {
            text-align: center;
            margin-top: 2rem;
        }

        .back-to-site a {
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s ease;
        }

        .back-to-site a:hover {
            color: #c5a028;
        }

        /* Remove border-radius resets for login page to keep modern feel */
        * {
            border-radius: revert !important;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Coat_of_arms_of_Egypt.svg" alt="Eagle">
            <h1 class="brand-title">رحلاتي</h1>
            <p class="brand-subtitle">لوحة التحكم السحابية المباشرة</p>
        </div>

        <div id="loginAlert" class="alert-custom">
            <i class="fa-solid fa-circle-info"></i>
            <span id="alertMessage"></span>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">البريد الإلكتروني للقرص</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="admin@rahalaty.com" required autocomplete="email">
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">كلمة المرور</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-login">
                <span id="btnText">تسجيل الدخول</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
            </button>
        </form>

        <div class="back-to-site">
            <a href="./"><i class="fa-solid fa-arrow-right me-1"></i>العودة للموقع الرئيسي</a>
        </div>
    </div>

    <!-- Appwrite Web SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if already logged in, redirect immediately
            if (sessionStorage.getItem('rahalaty_admin_logged_in') === 'true') {
                window.location.href = 'admin';
                return;
            }

            const loginForm = document.getElementById('loginForm');
            const alertBox = document.getElementById('loginAlert');
            const alertMessage = document.getElementById('alertMessage');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            function showAlert(message, type = 'error') {
                alertBox.className = `alert-custom alert-${type}`;
                alertBox.querySelector('i').className = type === 'error' ? 'fa-solid fa-circle-xmark' : 'fa-solid fa-circle-check';
                alertMessage.textContent = message;
                alertBox.style.display = 'flex';
            }

            function hideAlert() {
                alertBox.style.display = 'none';
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideAlert();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                // Set loading state
                submitBtn.disabled = true;
                btnText.textContent = 'جاري التحقق...';
                btnSpinner.classList.remove('d-none');

                try {
                    // Initialize DB Service (makes direct Appwrite connection)
                    await window.db.init();

                    if (!window.db.isAppwriteConnected()) {
                        showAlert('تعذر الاتصال بـ Appwrite. يرجى التحقق من إعدادات الاتصال في CONFIG أو إعدادات الأدمن.');
                        submitBtn.disabled = false;
                        btnText.textContent = 'تسجيل الدخول';
                        btnSpinner.classList.add('d-none');
                        return;
                    }

                    const conf = window.CONFIG.appwrite;
                    const { Query } = Appwrite;

                    // Query the 'admins' collection in Appwrite database
                    const response = await window.db.databases.listDocuments(
                        conf.databaseId,
                        'admins',
                        [
                            Query.equal('email', email),
                            Query.equal('password', password)
                        ]
                    );

                    if (response.documents.length > 0) {
                        const adminUser = response.documents[0];
                        
                        // Save session
                        sessionStorage.setItem('rahalaty_admin_logged_in', 'true');
                        sessionStorage.setItem('rahalaty_admin_name', adminUser.name);
                        sessionStorage.setItem('rahalaty_admin_email', adminUser.email);

                        showAlert('تم تسجيل الدخول بنجاح! جاري تحويلك لوحة التحكم...', 'success');
                        
                        setTimeout(() => {
                            window.location.href = 'admin';
                        }, 1200);
                    } else {
                        showAlert('عذراً، البريد الإلكتروني أو كلمة المرور غير صحيحة.');
                        submitBtn.disabled = false;
                        btnText.textContent = 'تسجيل الدخول';
                        btnSpinner.classList.add('d-none');
                    }

                } catch (err) {
                    console.error(err);
                    showAlert('خطأ: تعذر الاتصال بـ Appwrite أو أن جدول admins غير موجود.');
                    submitBtn.disabled = false;
                    btnText.textContent = 'تسجيل الدخول';
                    btnSpinner.classList.add('d-none');
                }
            });
        });
    </script>
</body>
</html>
